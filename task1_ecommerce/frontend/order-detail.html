<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail commande - Mon Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="material-symbols-outlined">storefront</span> Mon Shop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><span class="material-symbols-outlined">home</span> Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><span class="material-symbols-outlined">shopping_cart</span> Panier</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html"><span class="material-symbols-outlined">receipt_long</span> Mes commandes</a></li>
                    <li class="nav-item" id="logout-link"><a class="nav-link" href="#" id="logoutBtn"><span class="material-symbols-outlined">logout</span> Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <a href="orders.html" class="btn-view d-inline-flex mb-4" style="width:auto;">
            <span class="material-symbols-outlined">arrow_back</span> Retour
        </a>
        <div id="order-detail"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 Mon Shop — Tous droits réservés</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { getToken, isAuthenticated, logout } from './js/auth.js';
        import { API_URL } from './js/config.js';

        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = 'index.html';
        });

        async function loadOrderDetail() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById('order-detail');

            if (!id) {
                container.innerHTML = `<div class="alert alert-warning">Commande introuvable</div>`;
                return;
            }

            const token = getToken();
            const response = await fetch(`${API_URL}orders/${id}/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                container.innerHTML = `<div class="alert alert-danger">Impossible de charger la commande</div>`;
                return;
            }

            const order = await response.json();

            container.innerHTML = `
                <div class="cart-summary-box">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                        <h2 class="mb-0">Commande #${order.id}</h2>
                        <span class="stock-badge stock-available" style="position:static;display:inline-block;">${order.status}</span>
                    </div>
                    <p class="text-secondary mb-1">
                        <span class="material-symbols-outlined align-middle" style="font-size:1rem;">location_on</span>
                        ${order.address}
                    </p>
                    <p class="text-secondary mb-4">
                        <span class="material-symbols-outlined align-middle" style="font-size:1rem;">calendar_month</span>
                        ${new Date(order.created_at).toLocaleDateString()}
                    </p>
                    <hr>
                    <h5 class="mb-3">Articles</h5>
                    <div class="d-flex flex-column gap-2 mb-3">
                        ${order.items.map(item => `
                            <div class="d-flex justify-content-between border-bottom py-2">
                                <span>${item.product.name} × ${item.quantity}</span>
                                <strong>${item.price * item.quantity} FCFA</strong>
                            </div>
                        `).join('')}
                    </div>
                    <div class="d-flex justify-content-between">
                        <h5 class="mb-0">Total</h5>
                        <h5 class="text-success mb-0">${order.total} FCFA</h5>
                    </div>
                </div>
            `;
        }

        loadOrderDetail();
    </script>
</body>
</html>
