<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Shop - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="material-symbols-outlined">bolt</span> Mon Shop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><span class="material-symbols-outlined">home</span> Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><span class="material-symbols-outlined">shopping_cart</span> Panier <span id="cart-count" class="badge bg-danger">0</span></a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html"><span class="material-symbols-outlined">login</span> Connexion</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html"><span class="material-symbols-outlined">app_registration</span> Inscription</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card auth-card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <span class="material-symbols-outlined" style="font-size:2.5rem;color:var(--accent1);">bolt</span>
                            <h1 class="h3 mt-2">Content de vous revoir</h1>
                            <p class="text-secondary small">Connectez-vous pour continuer vos achats</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Email</label>
                                <input type="text" class="form-control" id="username" autocomplete="username" required />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Mot de passe</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="password" autocomplete="current-password" required />
                                    <button type="button" class="password-toggle" data-target="password">
                                        <span class="material-symbols-outlined">visibility</span>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
                                <span class="material-symbols-outlined">login</span> Se connecter
                            </button>
                        </form>
                        <div id="message" class="alert mt-3 d-none" role="alert"></div>
                        <p class="text-center text-secondary mt-3 mb-0">
                            Pas encore de compte ? <a href="register.html" style="color:var(--accent1);font-weight:600;">Créer un compte</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 Mon Shop — Tous droits réservés</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { login, isAuthenticated } from './js/auth.js';
        import { getCart } from './js/cart.js';

        function updateCartCount() {
            const total = getCart().reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = total;
        }

        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon = btn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `alert alert-${type} mt-3`;
        }

        if (isAuthenticated()) window.location.href = 'index.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connexion...';

            const result = await login(username, password);
            if (result === "Connexion réussie") {
                showMessage(result, 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
            } else {
                showMessage(result, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined">login</span> Se connecter';
            }
        });

        updateCartCount();
    </script>
</body>
</html>
