<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes commandes - Mon Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="material-symbols-outlined">storefront</span> Mon Shop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><span class="material-symbols-outlined">home</span> Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><span class="material-symbols-outlined">shopping_cart</span> Panier</a></li>
                    <li class="nav-item"><a class="nav-link active" href="orders.html"><span class="material-symbols-outlined">receipt_long</span> Mes commandes</a></li>
                    <li class="nav-item" id="logout-link"><a class="nav-link" href="#" id="logoutBtn"><span class="material-symbols-outlined">logout</span> Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="fw-bold mb-4">
            <span class="material-symbols-outlined align-middle">receipt_long</span> Mes commandes
        </h2>
        <div id="orders-list" class="d-flex flex-column gap-3"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 Mon Shop — Tous droits réservés</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { getToken, isAuthenticated, logout } from './js/auth.js';
        import { API_URL } from './js/config.js';

        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = 'index.html';
        });

        function statusBadgeClass(status) {
            if (status === 'Livrée' || status === 'Terminée') return 'stock-available';
            if (status === 'Annulée') return 'stock-out';
            return '';
        }

        async function loadOrders() {
            const token = getToken();
            const response = await fetch(`${API_URL}orders/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const container = document.getElementById('orders-list');

            if (!response.ok) {
                container.innerHTML = `<div class="alert alert-danger">Impossible de charger vos commandes.</div>`;
                return;
            }

            const orders = await response.json();

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">receipt_long</span>
                        <h3>Aucune commande passée</h3>
                        <p>Vos commandes apparaîtront ici une fois passées.</p>
                        <a href="index.html" class="btn btn-primary mt-2">Voir les produits</a>
                    </div>`;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="cart-item-card p-4">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                        <div>
                            <h5 class="mb-1">Commande #${order.id}</h5>
                            <p class="text-secondary small mb-1">
                                <span class="material-symbols-outlined align-middle" style="font-size:1rem;">location_on</span>
                                ${order.address}
                            </p>
                            <p class="text-secondary small mb-0">
                                <span class="material-symbols-outlined align-middle" style="font-size:1rem;">calendar_month</span>
                                ${new Date(order.created_at).toLocaleDateString()}
                            </p>
                        </div>
                        <div class="text-end">
                            <span class="stock-badge ${statusBadgeClass(order.status)}" style="position:static;display:inline-block;">${order.status}</span>
                            <div class="price mt-2">${order.total}<span class="currency"> FCFA</span></div>
                        </div>
                    </div>
                    <a href="order-detail.html?id=${order.id}" class="btn-view d-inline-flex mt-3" style="width:auto;">
                        <span class="material-symbols-outlined">visibility</span> Voir détails
                    </a>
                </div>
            `).join('');
        }

        loadOrders();
    </script>
</body>
</html>
