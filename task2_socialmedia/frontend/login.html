<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Social App</title>
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="icon" data-icon="hub"></span> Social App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Fil d'actualité</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Connexion</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Inscription</a></li>
                    <li class="nav-item">
                        <button class="theme-toggle-btn ms-2" id="themeToggleBtn" title="Changer de theme">
                            <span class="icon" data-icon="dark_mode" id="themeIcon"></span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card auth-card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <span class="icon" data-icon="hub" style="width:2.5rem;height:2.5rem;color:var(--accent);"></span>
                            <h1 class="h3 mt-2">Content de vous revoir</h1>
                            <p class="text-secondary small">Connectez-vous pour voir votre fil d'actualité</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="text" class="form-control" id="email" autocomplete="username" required />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Mot de passe</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="password" autocomplete="current-password" required />
                                    <button type="button" class="password-toggle" data-target="password">
                                        <span class="icon" data-icon="visibility"></span>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
                                <span class="icon" data-icon="login"></span> Se connecter
                            </button>
                        </form>
                        <div id="message" class="alert mt-3 d-none" role="alert"></div>
                        <p class="text-center text-secondary mt-3 mb-0">
                            Pas encore de compte ? <a href="register.html" style="color:var(--accent);font-weight:600;">Créer un compte</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { login, isAuthenticated } from './js/auth.js';
        import { initTheme, toggleTheme, updateThemeIcon } from './js/theme.js';
        import { renderIcons } from './js/icons.js';

        const currentTheme = initTheme();
        const themeIcon = document.getElementById('themeIcon');
        updateThemeIcon(themeIcon, currentTheme);
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            updateThemeIcon(themeIcon, toggleTheme());
        });

        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const iconSpan = btn.querySelector('.icon');
                if (input.type === 'password') {
                    input.type = 'text';
                    iconSpan.dataset.icon = 'visibility_off';
                } else {
                    input.type = 'password';
                    iconSpan.dataset.icon = 'visibility';
                }
                renderIcons(btn);
            });
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `alert alert-${type} mt-3`;
        }

        if (isAuthenticated()) window.location.href = 'index.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connexion...';

            const result = await login(email, password);
            if (result === "Connexion réussie") {
                showMessage(result, 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
            } else {
                showMessage(result, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<span class="icon" data-icon="login"></span> Se connecter';
                renderIcons(btn);
            }
        });

        renderIcons();
    </script>
</body>
</html>
