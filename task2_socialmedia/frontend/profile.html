<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil - Social App</title>
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="icon" data-icon="hub"></span> Social App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Fil d'actualité</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Mon profil</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Déconnexion</a></li>
                    <li class="nav-item">
                        <button class="theme-toggle-btn ms-2" id="themeToggleBtn" title="Changer de theme">
                            <span class="icon" data-icon="dark_mode" id="themeIcon"></span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4" style="max-width: 680px;">
        <div id="profile-content"></div>
        <div id="user-posts"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { isAuthenticated, logout } from './js/auth.js';
        import { getMyProfile, getUserProfile, uploadAvatar, followUser, unfollowUser } from './js/profile.js';
        import { getUserPosts, likePost, unlikePost, addComment } from './js/posts.js';
        import { initTheme, toggleTheme, updateThemeIcon } from './js/theme.js';
        import { renderIcons } from './js/icons.js';

        const currentTheme = initTheme();
        const themeIcon = document.getElementById('themeIcon');
        updateThemeIcon(themeIcon, currentTheme);
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            updateThemeIcon(themeIcon, toggleTheme());
        });

        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = 'index.html';
        });

        function initials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        const params = new URLSearchParams(window.location.search);
        const viewedUserId = params.get('id');

        let isOwnProfile = true;
        let profileUserId = null;

        async function displayProfile() {
            const myProfile = await getMyProfile();
            isOwnProfile = !viewedUserId || parseInt(viewedUserId) === myProfile.id;
            profileUserId = isOwnProfile ? myProfile.id : parseInt(viewedUserId);

            const profile = isOwnProfile ? myProfile : await getUserProfile(profileUserId);
            const container = document.getElementById('profile-content');

            if (!profile) {
                container.innerHTML = `<div class="alert alert-danger">Impossible de charger le profil</div>`;
                return;
            }

            const avatarHtml = profile.avatar
                ? `<img src="${profile.avatar}" class="profile-avatar-large" style="object-fit:cover;">`
                : `<div class="profile-avatar-large">${initials(profile.name)}</div>`;

            const avatarWrapper = isOwnProfile
                ? `<label for="avatarInput" style="cursor:pointer;display:inline-block;">${avatarHtml}</label>
                   <input type="file" id="avatarInput" accept="image/*" class="d-none">`
                : avatarHtml;

            const followBtnHtml = isOwnProfile ? '' : `
                <button class="btn-follow ${profile.is_following ? 'following' : ''}" id="profileFollowBtn" style="margin:1rem auto 0;display:block;">
                    ${profile.is_following ? 'Abonné' : 'Suivre'}
                </button>
            `;

            container.innerHTML = `
                <div class="profile-header">
                    ${avatarWrapper}
                    <h3>${profile.name}</h3>
                    <p class="text-secondary">${profile.bio || "Aucune bio pour l'instant"}</p>
                    <div class="profile-stats">
                        <div>
                            <div class="profile-stat-value">${profile.followers_count}</div>
                            <div class="profile-stat-label">Abonnés</div>
                        </div>
                        <div>
                            <div class="profile-stat-value">${profile.following_count}</div>
                            <div class="profile-stat-label">Abonnements</div>
                        </div>
                    </div>
                    ${followBtnHtml}
                </div>
            `;

            if (isOwnProfile) {
                document.getElementById('avatarInput').addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const updated = await uploadAvatar(file);
                    if (updated) await displayProfile();
                });
            } else {
                document.getElementById('profileFollowBtn').addEventListener('click', async function() {
                    const isFollowing = this.classList.contains('following');
                    if (isFollowing) {
                        await unfollowUser(profileUserId);
                        this.classList.remove('following');
                        this.textContent = 'Suivre';
                    } else {
                        await followUser(profileUserId);
                        this.classList.add('following');
                        this.textContent = 'Abonné';
                    }
                });
            }
        }

        function timeAgo(dateStr) {
            const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
            if (diff < 60) return "à l'instant";
            if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
            if (diff < 86400) return `il y a ${Math.floor(diff / 3600)} h`;
            return new Date(dateStr).toLocaleDateString();
        }

        function renderProfilePost(post) {
            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-content">${post.content}</div>
                    <div class="post-date">${timeAgo(post.created_at)}</div>
                    <div class="post-actions">
                        <button class="post-action-btn like-btn ${post.is_liked ? 'liked' : ''}" data-id="${post.id}">
                            <span class="icon" data-icon="${post.is_liked ? 'favorite_filled' : 'favorite'}"></span>
                            <span class="likes-count">${post.likes_count}</span>
                        </button>
                        <button class="post-action-btn toggle-comments-btn" data-id="${post.id}">
                            <span class="icon" data-icon="chat_bubble"></span>
                            <span>${post.comments.length}</span>
                        </button>
                    </div>
                    <div class="comments-section d-none" id="comments-${post.id}">
                        ${post.comments.map(c => `
                            <div class="comment-item">
                                <span class="comment-author">${c.author_name}</span> ${c.content}
                            </div>
                        `).join('')}
                        <div class="comment-form">
                            <input type="text" placeholder="Ajouter un commentaire..." class="comment-input" data-id="${post.id}">
                            <button class="submit-comment-btn" data-id="${post.id}">
                                <span class="icon" data-icon="send"></span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachPostEvents() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const isLiked = btn.classList.contains('liked');
                    const countSpan = btn.querySelector('.likes-count');
                    const iconSpan = btn.querySelector('.icon');
                    let count = parseInt(countSpan.textContent);

                    if (isLiked) {
                        await unlikePost(id);
                        btn.classList.remove('liked');
                        iconSpan.dataset.icon = 'favorite';
                        countSpan.textContent = count - 1;
                    } else {
                        await likePost(id);
                        btn.classList.add('liked');
                        iconSpan.dataset.icon = 'favorite_filled';
                        countSpan.textContent = count + 1;
                    }
                    renderIcons(btn);
                });
            });

            document.querySelectorAll('.toggle-comments-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const section = document.getElementById(`comments-${btn.dataset.id}`);
                    section.classList.toggle('d-none');
                });
            });

            document.querySelectorAll('.submit-comment-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const input = document.querySelector(`.comment-input[data-id="${id}"]`);
                    const content = input.value.trim();
                    if (!content) return;

                    const success = await addComment(id, content);
                    if (success) {
                        input.value = '';
                        await displayUserPosts();
                    }
                });
            });
        }

        async function displayUserPosts() {
            const posts = await getUserPosts(profileUserId);
            const container = document.getElementById('user-posts');

            container.innerHTML = `<h5 class="mb-3 mt-4">${isOwnProfile ? 'Mes publications' : 'Publications'}</h5>`;

            if (!posts || posts.length === 0) {
                container.innerHTML += `
                    <div class="empty-state">
                        <span class="icon" data-icon="chat_bubble" style="width:4rem;height:4rem;color:var(--text-light);margin:0 auto 1rem;"></span>
                        <h3>Aucune publication</h3>
                    </div>`;
                renderIcons(container);
                return;
            }

            container.innerHTML += posts.map(renderProfilePost).join('');
            renderIcons(container);
            attachPostEvents();
        }

        async function init() {
            await displayProfile();
            renderIcons(document.getElementById('profile-content'));
            await displayUserPosts();
        }

        init();
    </script>
</body>
</html>
